<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#C75D3C" />
<title>Offline — RecipeCrave</title>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #FAF7F2;
    color: #1F1B16;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 480px;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    color: #1F1B16;
    font-size: 32px;
    margin: 0 0 8px 0;
  }
  h1 span { color: #C75D3C; }
  p { color: #6B6660; line-height: 1.5; font-size: 16px; }
  a {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 24px;
    background: #C75D3C;
    color: white;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
  }
  .icon { font-size: 56px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Recipe<span>Crave</span></h1>
  <h2>You're offline</h2>
  <p>Looks like your connection dropped. The pages you've already viewed should still work — try the back button. New pages will load again when you're back online.</p>
  <a href="/">Try home page</a>
</div>
</body>
</html>
